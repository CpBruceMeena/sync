version: "3.8"

services:
  # ── PostgreSQL ────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: sync
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

  # ── Go Backend ────────────────────────────────────────────
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: password
      DB_NAME: sync
      DB_SSLMODE: disable
      SERVER_PORT: 8080
      JWT_SECRET: super-secret-key-change-in-production
      JWT_ACCESS_TTL: 15
      JWT_REFRESH_TTL: 7
    depends_on:
      db:
        condition: service_healthy

  # ── Next.js Frontend ──────────────────────────────────────
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    depends_on:
      - backend

  # ── Backend Tests ─────────────────────────────────────────
  test:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: test
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: password
      DB_NAME: sync
      DB_SSLMODE: disable
      SERVER_PORT: 8080
      JWT_SECRET: super-secret-key-change-in-production
      TEST_DATABASE_URL: postgres://postgres:password@db:5432/sync?sslmode=disable
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
